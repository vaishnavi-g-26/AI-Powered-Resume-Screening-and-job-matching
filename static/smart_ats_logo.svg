<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Deep navy-indigo background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97b1a"/>
      <stop offset="50%" style="stop-color:#e8a045"/>
      <stop offset="100%" style="stop-color:#f5c27a"/>
    </linearGradient>

    <!-- Cyan-blue gradient for magnifier + arrow -->
    <linearGradient id="cyanBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>

    <!-- Arrow gradient (cyan to purple) -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Magnifier lens gradient -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>

    <!-- Document gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.22)"/>
      <stop offset="100%" style="stop-color:rgba(167,139,250,0.12)"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for arrow -->
    <filter id="arrowGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for circle -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="22" flood-color="#061018" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- ======================== -->
  <!-- BACKGROUND CIRCLE        -->
  <!-- ======================== -->
  <circle cx="200" cy="200" r="185" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="172" fill="none" stroke="rgba(6,182,212,0.12)" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="158" fill="none" stroke="rgba(6,182,212,0.06)" stroke-width="1"/>

  <!-- Subtle radar rings -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="rgba(6,182,212,0.06)" stroke-width="1"/>
  <circle cx="200" cy="200" r="85"  fill="none" stroke="rgba(6,182,212,0.04)" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="rgba(6,182,212,0.07)" stroke-width="1">
    <line x1="200" y1="28" x2="200" y2="372"/>
    <line x1="28"  y1="200" x2="372" y2="200"/>
    <line x1="88"  y1="88" x2="312" y2="312"/>
    <line x1="312" y1="88" x2="88"  y2="312"/>
  </g>

  <!-- Corner circuit dots -->
  <g fill="rgba(6,182,212,0.35)" filter="url(#glow)">
    <circle cx="200" cy="48"  r="3"/>
    <circle cx="352" cy="200" r="3"/>
    <circle cx="200" cy="352" r="3"/>
    <circle cx="48"  cy="200" r="3"/>
    <circle cx="110" cy="110" r="2"/>
    <circle cx="290" cy="110" r="2"/>
    <circle cx="110" cy="290" r="2"/>
    <circle cx="290" cy="290" r="2"/>
  </g>

  <!-- ======================== -->
  <!-- DOCUMENT ICON            -->
  <!-- ======================== -->

  <!-- Document glow -->
  <rect x="116" y="90" width="122" height="158" rx="12" ry="12"
        fill="rgba(6,182,212,0.15)" filter="url(#glow)"/>

  <!-- Document body -->
  <rect x="112" y="86" width="122" height="158" rx="12" ry="12"
        fill="url(#docGrad)"
        stroke="rgba(6,182,212,0.35)"
        stroke-width="1.5"/>

  <!-- Fold corner -->
  <path d="M204 86 L234 116 L204 116 Z"
        fill="rgba(6,182,212,0.3)"
        stroke="rgba(6,182,212,0.45)"
        stroke-width="1.2"/>
  <!-- Corner crease line -->
  <line x1="204" y1="86" x2="204" y2="116" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Document text lines -->
  <line x1="132" y1="138" x2="224" y2="138" stroke="rgba(255,255,255,0.55)" stroke-width="3"   stroke-linecap="round"/>
  <line x1="132" y1="154" x2="224" y2="154" stroke="rgba(255,255,255,0.32)" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="132" y1="169" x2="206" y2="169" stroke="rgba(255,255,255,0.26)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="132" y1="184" x2="214" y2="184" stroke="rgba(255,255,255,0.22)" stroke-width="2"   stroke-linecap="round"/>
  <line x1="132" y1="198" x2="200" y2="198" stroke="rgba(255,255,255,0.18)" stroke-width="2"   stroke-linecap="round"/>
  <line x1="132" y1="212" x2="210" y2="212" stroke="rgba(255,255,255,0.15)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="132" y1="225" x2="196" y2="225" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ======================== -->
  <!-- UPWARD ARROW             -->
  <!-- ======================== -->
  <!-- Arrow shaft + head, positioned bottom-right overlapping doc -->
  <g filter="url(#arrowGlow)">
    <!-- Arrow pointing up-right -->
    <path d="M235 282 L235 230 L252 230 L222 195 L192 230 L209 230 L209 282 Z"
          fill="url(#arrowGrad)"
          opacity="0.92"/>
  </g>

  <!-- ======================== -->
  <!-- MAGNIFYING GLASS         -->
  <!-- ======================== -->

  <!-- Handle -->
  <line x1="268" y1="278" x2="298" y2="308"
        stroke="url(#arrowGrad)"
        stroke-width="10"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Lens outer ring (glow) -->
  <circle cx="248" cy="256" r="34"
          fill="rgba(6,182,212,0.15)"
          stroke="rgba(6,182,212,0.4)"
          stroke-width="2"
          filter="url(#glow)"/>

  <!-- Lens fill -->
  <circle cx="248" cy="256" r="28" fill="url(#lensGrad)" opacity="0.92"/>

  <!-- Circuit brain inside lens -->
  <!-- Outer circuit ring -->
  <circle cx="248" cy="256" r="20" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Circuit board nodes -->
  <g fill="rgba(255,255,255,0.9)">
    <circle cx="248" cy="238" r="2.5"/>
    <circle cx="264" cy="248" r="2.5"/>
    <circle cx="264" cy="264" r="2.5"/>
    <circle cx="248" cy="274" r="2.5"/>
    <circle cx="232" cy="264" r="2.5"/>
    <circle cx="232" cy="248" r="2.5"/>
    <circle cx="248" cy="256" r="3.5"/>
  </g>

  <!-- Circuit connections -->
  <g stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round">
    <line x1="248" y1="240" x2="248" y2="252"/>
    <line x1="262" y1="249" x2="252" y2="253"/>
    <line x1="262" y1="263" x2="252" y2="259"/>
    <line x1="248" y1="272" x2="248" y2="260"/>
    <line x1="234" y1="263" x2="244" y2="259"/>
    <line x1="234" y1="249" x2="244" y2="253"/>
  </g>

  <!-- Circuit tick marks on ring -->
  <g stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round">
    <line x1="248" y1="236" x2="248" y2="240"/>
    <line x1="266" y1="246" x2="263" y2="249"/>
    <line x1="266" y1="266" x2="263" y2="263"/>
    <line x1="248" y1="276" x2="248" y2="272"/>
    <line x1="230" y1="266" x2="233" y2="263"/>
    <line x1="230" y1="246" x2="233" y2="249"/>
  </g>

  <!-- Lens shine highlight -->
  <ellipse cx="238" cy="244" rx="6" ry="4"
           fill="rgba(255,255,255,0.15)"
           transform="rotate(-35 238 244)"/>

</svg>
