<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

<h2>Add New Job</h2>

<form action="/add_job" method="POST">
    <input type="text" name="title" placeholder="Job Title" class="form-control mb-2" required>
    <textarea name="description" placeholder="Job Description" class="form-control mb-2" required></textarea>
    <button class="btn btn-success">Add Job</button>
</form>

<hr>

<h2>All Candidates</h2>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Job ID</th>
<th>Score</th>
</tr>

{% for c in candidates %}
<tr>
<td>{{ c.name }}</td>
<td>{{ c.job_id }}</td>
<td>{{ c.score }} %</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
